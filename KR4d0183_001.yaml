  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0183_WYG_001-1a, image: WYG1135/WYG1135-0784c.png}
body:
  text: 藏海居士集巻上宋呉可撰五言古詩題馬上元所藏趙墨隱畫淵明四詩我不識趙子見此便得之談笑出丘壑粲然備四時似聞月旦評氣壓淵明詩馬卿宰白下慣作煙雲嬉歸來九衢塵舊好不少移慇懃著懐袖亦足慰夢思我本家北阜一官老京師頗懐月下松披圖覔幽姿正恐林間鶴怨我歸無期那知此心在衡宇終棲遲誰憐阿堵中幾有一斛泥願分溪上山供我笏拄頥呉秀才出示孫尚書詩求鄙作往時家分寧風俗喜追隨挽留杯酒間往往醉如泥比年舍臨汝閉闗無相知牢落三週星淹泊一水湄人事即漸熟鄰曲不復疑聞有長者客清談頗忘疲宗盟晚相遇佳比野鶴姿過我忽長鳴傾倒胷中竒借問所從來半世游京師羣賢共文字聲名冠當時自得固有餘足能攀桂枝上以榮北堂下以光衰遲故山末暇往舊游不足思牆東或可隱便擬營茒茨竒懐傲南牕幽花擷東籬是亦差可樂去此將何為恨未識胥鄧論交尚差池不妨氣類求相與慰渴飢同姓紛在眼邈然棄如遺此道已澆薄君乃敦篤之何當美盛徳老矣徒嗟咨黄嬭厄兵火荒唐廢文辭毛子素偃蹇豈復能發揮誰為國士重自有尚書詩題質龜軒清江料事錯來作刳膓翁不知幾許靈墮此朽骨中時出縱横文隨意侮兒童誰識軒中人本自無吉凶平生不驚俗要與衆客同人言可為鑒試卜來年豐巖齋誰知望雲眼犯此没馬塵故山招不歸定為猿鶴嗔煌煌帝王州喜有東山人頻來雲霧齋閱公碧璘珣要償風月債痛吟巖壑春賢哉萬巻藏膏馥餘八珍空腸借一飽已覺笑語新肯學解頥公鑿壁惱四鄰大勝不求直樂我平生真筠寮解衣一寮上物色太窘束栢禪費酬對松官縛爵禄此君真有道虛心自嵓谷毎以閱世人得之定超俗夜夜幽露寒驚我庭下緑獨出萬物表清蟾映疎玉嘉此煙霧姿本無霜雪辱朔風舞郊野秀氣壓羣木舊根走苔徑新梢出雲屋要令千畞廣㑹待春雨足贈連楚狂誰有畫魚癖詩社尋楚狂真成戲新荷徑欲穿垂楊餘生墮轍中恍然得濠梁寓興亦差樂江湖庶相忘舟中即事四顧彭蠡湖獨知廬阜尊疊嶂逓圍繞拱立猶兒孫扶笻望瀑布玉虹走祇園回步尋虚亭餘流潄瑤琨三峽誇幽險下有萬雷喧龍淵神物家孰敢窺清渾歸來有餘思妙音傳夣魂易舟大孤傍山川出籠樊生平數佳士歡然笑語温殊鄉愛逺客一見如弟昆直有卜鄰意便擬營柴門惜別屢往還遺酒盈瓶盆回首幽居雲忽作聚墨昏岡巒互起伏時為煙霧吞遙知急雨來坐看風水奔浮家若漂泊且繫古栁根晚來喜新霽遙岑淡餘痕岸花自娬媚始怪秋色繁近沙羣鷺驚炯如積雪翻林間問茒屋欲與漁父言想像翠靄中疑有桃花源津子請息肩買醉溪上村我亦睡篷底輾轉吟東屯痛彼日月逺念此骨肉存誰能致薪粲庶幾度寒暄避秦豈本志多病不復論送李四清連侯愛畫魚李侯愛畫山詩情動幽懐摹冩不少閒騷雅移丹青妙寄雲水間翻然欲登涉試尋芷與蘭我不一音解早年便挂冠養拙頹簷下任真亦足歡敵騎踐江浙少長奔荆蠻却行虎狼區益知行路難亂來戰未息老去食轉艱前年治南畞頗喜人牛安力耕日以廣心事日以寛行當遂野性䇿杖尋江干雲深幾茒屋栁映一柴闗扁舟鳴撥刺危亭秀孱顔安得兩玉人隣曲相追攀真賞㑹心處應當謝毫端長哦洗兵馬隨意羅杯盤伯雅要傾倒莫厭數往還願如三徑松餘生同嵗寒送王觀文正活國手頗恨見不及宦遊識其孫想像髙冠岌豈但為交承自是賢友執尤思談性命㣲到鬼神泣吾曹飲滄海百川羮一吸失却大官味巻舌䑛泥汁因依既云久臨別百憂集去去好護持雨荷終不濕避地桂楊山門招友人晚飲荒城住行李故人亦淹留稍遷墟丘間愛此石泉幽長夏晴復雨風氣如清秋開樽茅茨下焉能消百憂客懐滯荆楚念之成白頭今宵理歸夢一棹隨風流過許醉吟痛飲月下戲書塵埃沒我馬掉鞅吟公詩詩中有江山不覺在京師下馬自叩門來尋元紫芝欲掃名利心笑挹丘壑姿東簷坐無氊北風吹酒巵蟹螯互勸酬墜車兩不辭聴公擊節吟悲壯亦自竒看公醉山倒了不遣客歸客歸意亦好月色到處隨詩成月下寫淡墨任傾欹平生不知韻興來聊續之詞達語更正識者未必嗤探梅探春逼殘嵗幽香度寒原欲看枝横水㑹待月掛村誰憐槁木中妙有春風根孤芳自一丘不受煙霧昏飽霜分疎瘦下笑浪蕋繁喜無蜂蝶知那與桃李言要當碧雲暮殷勤賦離魂泰定齋詩寂然數椽下獨耀一宇内脫落山水因妙出仁智外君看鑑中事作止本無礙年來識坐忘唯餘照心在安静齋詩歸來便閒適松檜自儔侣扶疎媚虚堂初無一禽語長哦柴桑詩妙香吐雲縷平生壑源好蓮甌發新乳痛洗朝來忙得意乃如許輪蹄不到門幽壁掛犀麈笑拂維摩床西窻睡秋雨失題熱官惱狂士氷山倚嚴冬此計定不長㑹作須臾空先生踏金門大節孝與忠能事不掛口處之如無功髙隱百僚上妙有淵明風東垣著巖岫南榮著檜松疎窻澹山影雲霧穿玲瓏澄流粲錦石一練搖青紅笑攜玉色醪酌彼千石鍾良時飲文字此興與誰同為君指佳處不落捷徑中從來論丘壑風味過庾公七言古詩祕古堂詩羣兒只解祕金玉百嵗作癡空潤屋君家勝味渠不知掉頭歸來北窻讀挿架整整三萬籖誰何有書真不然是中大字到蝌蚪補亡應得由庚篇異錦千囊更妙好中有玉奩藏小草不煩脫帽苦揮毫漫說驚虵雜飛鳥摩挲鼎彛自笑語碧暈堆花久瘞土懸知百好墮兒戲此物一出吞萬古客來錯惡初不解把玩慇懃定為怪我知此老極不淺規模正欲超三代題翹翠軒詩老木拔雲蒼翠起新篁挾雨枝葉美下有數峯莓苔寒先生俯仰一笑喜乘興把書坐秋風超然吐論飛長虹客星忽去璧月上陶陶醉卧玻璃中李氏娛書齋李侯平生無他好眼中黄巻常自娯明窻危坐對賢聖鼓吹不可一日無欣然㑹意便忘食心醉何止勤三餘幾年攜家避盜寇尚得戲綵乗潘輿攝官江外有何好濶步日邊真良圖試求假直亦不惡他年不減行秘書故人來自舂陵出示初寮翰墨感時懐舊輒為長句先生視草白玉堂文章一出自名世分光蓮燭真為榮拭吐龍巾何足擬艮岑夜召趨神霄憐我婆娑百僚底紫禁歡傳拜左轄漫刺走賀城南第羸僮瘦馬堂階下歎我麄官殊少味驚聞一麾出燕山斾旌遽下雲漢間睿思官曹方顧寵笑我翻然歸挂冠金兵南來郡國破二聖北狩天步艱黎元鼎沸死鄉土士夫雲擾奔荆蠻一人甞膽固不易諸將束胷今何難朝來喜見舂陵客問訊先生多翰墨懐古傷時初不忘回首長安淚横臆君不見虎踞龍盤氣象雄王者都此成大功遙知廟堂有髙論似聞天蹕移江東幾年中興要賢俊頗懐仲父安東晉醉鄉詩飲中境界妙四海楚屈未知風俗淳陶然席地已忘載夜縛甕下初不嗔逃禪罵坐本真率時一中之眇萬物縱兵端欲捲愁城樂賢未始忘歡伯佳處風光殊可人好徳懸知必有鄰黄花解勸張季鷹俗婦那識劉伯倫世間萬物敗人意不如常作箇中計山居見梅孤吟梅花望神京澆愁恨無雙玉缾上林顧影一坐傾髙樓忍作昭華聲避兵南州老雲壑風味依然殊不惡嵗暮渾無驛使來一笑天涯共流落行尋嶺頭路幾許欲買幽園歎貧窶清客那知日邊事獨坐茅茨對煙雨夜聞警幾年官軍破郡邑逺客孤村誰脫急卧聴鄰雞三鼓鳴流言敵騎一宵及抱衾攜幼强趨走複嶺重山且深入為聞北人畏和暖安得如今便驚蟄長秋南奔苦嵐瘴翠華連巡犯卑濕顧我飄零豈足念注目寒江忘久立
