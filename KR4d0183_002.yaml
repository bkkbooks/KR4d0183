body:
  text: 藏海居士集巻下宋呉可撰五言律詩即事勁敵謀應大春來勢轉雄烽煙驚北闕鼙鼓戰東風雪舞愁雲外花飛淚眼中翠華行樂處戈甲照寒空寄李道夫亂後時通問飄流尚此身干戈傷白髪桃李自青春故國田疇逺殊方盜賊頻知君懐老伴詩酒慰情親遊清涼寺延步石城塢迢迢去興長野田耕晚雪寒樹倚斜陽載酒追狂客論才得漫郎無因遂髙蹈時復借山房養竹渭川分一種親植隱嵓東有實終來鳳無心自化龍疎隂留夜月清韻起秋風待養鼇竿就滄溟作釣翁登臨川城時危傷去國嵗晚强登城過雁書難問窮途淚欲傾江湖歸客夢梅栁故園情倚杖空凝竚行藏竟不成懐歸久客江湖逺頻年道路艱干戈侵海内猿鶴老山間地僻林泉古雲深日月閒餘生猶轉徙清夢遶柴闗五言排律次韻曽中父登臨川郡樓書事戈甲何為盛田園已就荒僅能移北阜未暇隱東牆寂寞交親逺漂零道路長歸心隨斷雁離思感埀楊避寇湘江外依劉汝水傍閭閻嗟偪仄登眺喜寛涼逺岫誰能屐寒溪竟欲航氷盤悲玉井風簟愛筠牀地盡妖氛氣春餘草木光寶薫烟霧細仙茗笑談香接武青雲路論文緑野堂虎皮空自恱猿臂定誰攘取友真多益求田苦未藏撑腸披錦繡潄石飽膏肓隱逸追元亮風騷近子昂栖鵶啼古堞幽檻倚斜陽離亂知誰健行藏只自傷舊巢看燕燕今雨任浪浪道勝依鶖子才髙歎夜郎五峯興不淺星漢擬文章七言律詩友人恵笋豉野稅那知笋豉香伊蒲淡泊喜初甞自憐老去能忘肉謂肉豉誰謂朝來已徹薑謂薑豉膾玉有名汙淨供蓴絲無味誑枯腸此君苖裔風流在三韭何須學庾郎謝友人約居横林逺煩招隱費長吟緩急方知故舊心懐土若為家直瀆避喧真欲客横林人材何敢追連璧氣類聊能擬斷金卜築要須孤絶處落花流水恐相尋春雪後寄范長民回首長安淚滿衣東風如舊鬢成絲扶持衰病元無術感歎飄零漫有詩那信夢魂隨北雁忍看霜雪滿南枝幽居只合從公等自笑年來見事遲呈秦楚材倒指煙塵嵗月深引杯看劍漫悲吟平生自歎雕蟲手末路空慙䑛犢心賸喜星郎上雲漢苦憐鶴髮避山林君家伯仲真廊廟痛為中興惜寸隂和人聞笛鄰笛聲哀不自安轉移宫調幾多般夢回飛蝶三千里月照髙樓十二欄別鶴唳長秋露重老龍吟苦夜潭寒清愁一晌知何限待啓菱花向曉看簇翠亭此老作亭蒼翠間定知胷次有東山朝陽破霧烘林影醉袖扶花繞髻鬟露警丹哥傳妙響雲眠碧友自清閒欲専一壑從來事回首塵埃亦厚顔廬山香林訪趙徳麟艤舟星渚得幽尋問訊先生隱翠岑欲禮光明依浄社便隨氣類老香林貂金且換陶潜醉囊錦聊追白傳吟坡客飄零有公在與誰揮淚說知音探梅栁未搖金草未芽尋幽逸興屬詩家不辭山下五六里為愛枝頭三四花噴月清香猶吝惜印溪疎影恣横斜固應羞澁怯寒峭結子成隂已有涯送李秀才為道士聖澤朝來浄世縁不敎仙骨墮儒門金龜換酒當年客白鹿昇天後世孫泉石招君友猿鶴利名憐我醉朝昏麻衣笑著掉頭去何處抱琴追綺園豫章道中僕已疲勞馬已頹忍能日日犯風埃前山斷處後山出舊雨晴時新雨來梅子有情沿路熟麥花無數及時開一春客裏消磨盡舉眼豫章安在哉九日佳節初回苦未涼疎林髙下半青黄佩茱頗喜人猶健採菊還憐蝶尚狂不惜登山聊舉句欲因戲馬漫擎蒼笑欹醉帽歸來晚稍覺幽庭月似霜次韻黄簿九日客裏登髙意若何笑扶藜杖興還多葉金委地誰能布山劔橫天不受磨隨遇可無揮翰手感時空有斷腸歌尚憐把菊煙塵外自鏡衰容半欲酡寄米元暉田廬寂寂近塘坳仕路紛紛久絶交多病未能從五栁避喧端欲老三茒白雲那忍閒歸岫紫燕空慙漫累巢聞再落致仕聞道金壇有仙隱夢回清月墮林梢五言絶句野歩宻竹藏啼鳥荒村起白煙人行秋色裏家在夕陽邊夜坐索索風搖幕亭亭月過牆晴雷推粉磨夜雨壓槽床七言絶句春霽南國春光一半歸杏花零落雨霏微新晴院宇寒猶在曉絮欺風不肯飛春晚門外緑楊啼乳鴉㺯黄梅子壓枝斜殘書讀罷無功課遶徑來尋未落花蜂兒擷蘂趁花心燕子銜泥掠栁隂處處浸秧黄乍吐護田肥水半篙深踏青幽居懶慢養餘生强為春風處處行藉草㺯花終少味尋山愛竹尚多情過巢邑竹杖芒鞋蹋短蓬没篙春水飽帆風兩闗三寺山無數盡在濛濛烟雨中村居鑿井耕田僅萬家農夫農婦畢絲麻夜來得雨陂塘足村北村南罷踏車荒陂荒陂終日水車鳴村北村南共一聲掠面輕風吹小雨鄙夫詩向此時成松秋色何妨陪露菊嵗寒真欲友霜筠只應澗底桃花笑苦愛微官不避秦晚步野樹疎疎透夕陽歸鴉零亂不成行春風可是閒來往時送江梅一陣香書却暑圖後氷柱雪車誰復作礬頭凌面未能摹北窻揮汗渾無奈漫借君家却暑圖偶贈陳居士楚酒困人三日醉園花著雨百般紅憑誰畫出陳居士亭角尋詩滿袖風村巷詩村巷深深桑柘烟園林寂静落花天柴門有客忙相揖搖手低聲蠶大眠田家女兩兩埀髫窈窕娘含羞無語蒔青秧翻思貴室千金女笑倚紅樓抹曉粧初涼初涼宜夜透衣羅時見流星度絳河漸覺露溥金掌重梧桐影外月明多小醉小醉初醒過竹村數家殘雪擁籬根風前有恨梅千㸃溪上無人月一痕
