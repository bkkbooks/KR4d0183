body:
  text: 提要藏海居士集二卷别集類三宋臣等謹案藏海居士集散見永樂大典中題宋吳可撰可事迹無考亦不知何許人考集中年月當在宣和之末其詩有一官老京師句又有挂冠養拙之語知其嘗官于汴京復乞間以去又有往時家分寧比年客臨汝及避冦湘江外依劉汝水旁句知其嘗居洪州建炎以後轉徙楚豫之間又可别有藏海詩話一卷亦載永樂大典中多與韓駒論詩之語中有童德敏木筆詩一條考容齋三筆載臨川童德敏湖州題顔魯公祠堂詩一篇其人與洪邁同時則可於南渡之後至乾道淳熙間尚在也集中所與酬答者如王安中趙令畤米友仁諸人亦多南北宋間文士元祐諸賢風流未沫故所存篇什無多而大致清警與謝邁兄弟氣格相近特其集既不傳後之言宋詩者遂不能知其姓氏厲鶚宋詩紀事搜羅至三千八百餘家亦未之及則其沈晦已久矣今一一裒輯析為二卷與詩話同著于録俾不致終就湮沒焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ca3f03563de12b39e1367842ec31027aa19c97a4abe9c7365fe8226ed4aee4b8
